version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Prague
    groups:
      go-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:10"
      timezone: Europe/Prague
    groups:
      root-tooling:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:20"
      timezone: Europe/Prague
    groups:
      frontend-dependencies:
        dependency-type: production
        patterns: ["*"]
      frontend-tooling:
        dependency-type: development
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Prague
    groups:
      github-actions:
        patterns: ["*"]
