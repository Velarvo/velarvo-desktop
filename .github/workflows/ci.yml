name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14
  GOLANGCI_LINT_VERSION: v2.12.2
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  frontend:
    name: Frontend / Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: make format-check-frontend

      - name: Lint Svelte and TypeScript
        run: make lint-frontend

      - name: Type-check
        run: make typecheck-frontend

      - name: Test
        run: make test-frontend

      - name: Build frontend
        run: make fe-build

  go-lint:
    name: Go / Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify module checksums
        run: go mod verify

      - name: Prepare Wails embed directory
        run: mkdir -p frontend/dist && touch frontend/dist/.keep

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Check Go formatting
        run: make format-check-go

      - name: Lint Go
        run: make lint-go

  go-test:
    name: Go / Test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install Wails Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            gcc \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Run race tests with coverage
        run: go test ./internal/... -race -coverprofile=coverage.out -covermode=atomic

      - name: Report coverage
        run: go tool cover -func=coverage.out
