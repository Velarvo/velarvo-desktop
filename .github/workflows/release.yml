name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  APP_NAME: Velarvo

jobs:
  ci:
    name: CI Check
    uses: ./.github/workflows/ci.yml

  release-linux-amd64:
    name: Release / Linux amd64
    runs-on: ubuntu-24.04
    needs: ci
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config gcc \
            libayatana-appindicator3-dev \
            libfuse2 \
            dpkg fakeroot

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build
        run: |
          export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig"
          wails build -platform linux/amd64 -o ${{ env.APP_NAME }} -clean -tags webkit2_41

      - name: Package .deb
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          mkdir -p dist/deb/DEBIAN
          mkdir -p dist/deb/usr/bin
          mkdir -p dist/deb/usr/share/applications
          mkdir -p dist/deb/usr/share/icons/hicolor/256x256/apps

          cp build/bin/${{ env.APP_NAME }} dist/deb/usr/bin/velarvo
          cp build/appicon.png dist/deb/usr/share/icons/hicolor/256x256/apps/velarvo.png

          cat > dist/deb/DEBIAN/control << EOF
          Package: velarvo
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: Josef Zeman <kontakt@josefzeman.cz>
          Homepage: https://velarvo.dev
          Description: Open-source developer platform
           SSH terminal, database manager, API client and encrypted vault.
          EOF

          cat > dist/deb/usr/share/applications/velarvo.desktop << EOF
          [Desktop Entry]
          Name=Velarvo
          Exec=velarvo
          Icon=velarvo
          Type=Application
          Categories=Development;
          Comment=SSH terminal, database manager, API client
          EOF

          fakeroot dpkg-deb --build dist/deb \
            build/bin/velarvo_${VERSION}_linux_amd64.deb

      - name: Package .AppImage
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          mkdir -p dist/appimage/usr/bin
          mkdir -p dist/appimage/usr/share/icons/hicolor/256x256/apps

          cp build/bin/${{ env.APP_NAME }} dist/appimage/usr/bin/velarvo
          cp build/appicon.png dist/appimage/usr/share/icons/hicolor/256x256/apps/velarvo.png
          cp build/appicon.png dist/appimage/velarvo.png

          cat > dist/appimage/velarvo.desktop << EOF
          [Desktop Entry]
          Name=Velarvo
          Exec=velarvo
          Icon=velarvo
          Type=Application
          Categories=Development;
          EOF

          cat > dist/appimage/AppRun << 'EOF'
          #!/bin/sh
          exec "$APPDIR/usr/bin/velarvo" "$@"
          EOF
          chmod +x dist/appimage/AppRun

          ARCH=x86_64 appimagetool dist/appimage \
            build/bin/velarvo_${VERSION}_linux_amd64.AppImage

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            build/bin/velarvo_*_linux_amd64.deb
            build/bin/velarvo_*_linux_amd64.AppImage

  release-windows-amd64:
    name: Release / Windows amd64
    runs-on: windows-latest
    needs: ci
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis --version=3.09 -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build
        run: wails build -platform windows/amd64 -o ${{ env.APP_NAME }} -clean -nsis

      - name: Package
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          cd build/bin

          [ -f "${{ env.APP_NAME }}" ] && mv "${{ env.APP_NAME }}" "${{ env.APP_NAME }}.exe" || true

          INSTALLER="${{ env.APP_NAME }}-amd64-installer.exe"
          [ -f "$INSTALLER" ] && mv "$INSTALLER" "velarvo_${VERSION}_windows_x64_setup.exe" || true

          if [ -f "${{ env.APP_NAME }}.exe" ]; then
            7z a -tzip "velarvo_${VERSION}_windows_x64_portable.zip" "${{ env.APP_NAME }}.exe"
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/bin/velarvo_*_windows_x64_setup.exe
            build/bin/velarvo_*_windows_x64_portable.zip

  release-macos-arm64:
    name: Release / macOS arm64
    runs-on: macos-latest
    needs: ci
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build
        run: wails build -platform darwin/arm64 -o ${{ env.APP_NAME }} -clean

      - name: Package .dmg
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          APP_PATH="build/bin/${{ env.APP_NAME }} Desktop.app"
          DMG_PATH="build/bin/velarvo_${VERSION}_mac_arm64.dmg"

          create-dmg \
            --volname "Velarvo" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 185 \
            "$DMG_PATH" \
            "$APP_PATH" || \
          (cd build/bin && zip -r "velarvo_${VERSION}_mac_arm64.zip" \
            "${{ env.APP_NAME }} Desktop.app")

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/bin/velarvo_*_mac_arm64.dmg
            build/bin/velarvo_*_mac_arm64.zip

