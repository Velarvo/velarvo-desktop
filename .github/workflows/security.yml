name: Security

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14

jobs:
  frontend-audit:
    name: Frontend / Dependency Audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Audit root tooling
        run: |
          bun install --frozen-lockfile
          bun audit --audit-level high

      - name: Audit frontend dependencies
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun audit --audit-level high

  govulncheck:
    name: Go / Vulnerability Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Wails embed directory
        run: mkdir -p frontend/dist && touch frontend/dist/.keep

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1.0.4
        with:
          repo-checkout: false
          go-version-file: go.mod
          go-package: ./...
          output-format: text

  trivy:
    name: Repository Scan / Trivy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan dependencies, secrets, and configuration
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          ignore-unfixed: true
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
